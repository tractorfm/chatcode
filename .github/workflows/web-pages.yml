name: Web Pages Deploy

on:
  push:
    branches:
      - "**"
    paths:
      - "packages/web/**"
      - ".github/workflows/web-pages.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Override branch name for preview deploy"
        required: false
        type: string
      target:
        description: "Deploy target"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Build & Deploy Pages
    runs-on: ubuntu-latest
    if: ${{ vars.CF_PAGES_PROJECT_PROD != '' && vars.CF_PAGES_PROJECT_STAGING != '' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      WEB_DIST_DIR: packages/web/dist
      PROD_PROJECT: ${{ vars.CF_PAGES_PROJECT_PROD }}
      STAGING_PROJECT: ${{ vars.CF_PAGES_PROJECT_STAGING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Verify Cloudflare Pages auth
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if corepack pnpm --dir packages/control-plane exec wrangler pages project list >/dev/null; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "::error::failed to verify Cloudflare Pages auth after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Build web app
        run: corepack pnpm --dir packages/web run build

      - name: Resolve deploy target
        id: target
        run: |
          set -euo pipefail

          branch="${{ github.event.inputs.branch || github.ref_name }}"
          branch="$(echo "${branch}" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | tr -cd 'a-z0-9-')"
          branch="${branch:0:48}"
          # If sanitization strips everything (e.g. branch name is only symbols),
          # use deterministic fallback instead of failing deploy target resolution.
          [[ -n "${branch}" ]] || branch="preview"
          requested_target="${{ github.event.inputs.target || '' }}"

          if [[ "${requested_target}" == "production" ]]; then
            project="${PROD_PROJECT}"
            deploy_branch="main"
          elif [[ "${branch}" == "main" || "${branch}" == "staging" ]]; then
            project="${STAGING_PROJECT}"
            deploy_branch="staging"
          else
            project="${STAGING_PROJECT}"
            deploy_branch="${branch}"
          fi

          echo "project=${project}" >> "${GITHUB_OUTPUT}"
          echo "deploy_branch=${deploy_branch}" >> "${GITHUB_OUTPUT}"

      - name: Verify dist output exists
        run: |
          test -d "${WEB_DIST_DIR}" || {
            echo "::error::missing web build output directory: ${WEB_DIST_DIR}"
            exit 1
          }

      - name: Deploy to Cloudflare Pages
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if corepack pnpm --dir packages/control-plane exec wrangler pages deploy "${GITHUB_WORKSPACE}/${WEB_DIST_DIR}" \
              --project-name "${{ steps.target.outputs.project }}" \
              --branch "${{ steps.target.outputs.deploy_branch }}" \
              --commit-dirty=true; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "::error::Cloudflare Pages deploy failed after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 10))
          done
