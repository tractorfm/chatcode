name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  gateway:
    name: Gateway Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/gateway/go.mod
          cache-dependency-path: packages/gateway/go.sum

      - name: Run gateway unit tests
        working-directory: packages/gateway
        run: make test

      - name: Run gateway deploy script tests
        working-directory: packages/gateway
        run: make test-deploy

  control-plane:
    name: Control Plane Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run control-plane tests
        run: pnpm --filter @chatcode/control-plane test

      - name: Run control-plane build
        run: pnpm --filter @chatcode/control-plane build
