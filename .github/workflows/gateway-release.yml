name: Gateway Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v0.0.6). Required when running from a branch ref."
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve Release Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          set -euo pipefail

          tag="${{ github.event.inputs.release_tag || '' }}"
          if [[ -z "${tag}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              tag="${GITHUB_REF#refs/tags/}"
            else
              echo "::error::release_tag input is required when workflow is not run from a tag ref."
              exit 1
            fi
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::invalid release tag: ${tag}"
            exit 1
          fi

          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/gateway/go.mod
          cache-dependency-path: packages/gateway/go.sum

      - name: Build binary
        working-directory: packages/gateway
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.release_tag }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DIST_DIR="dist/${VERSION}"
          OUT="${DIST_DIR}/chatcode-gateway-${{ matrix.goos }}-${{ matrix.goarch }}"

          mkdir -p "${DIST_DIR}"
          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -ldflags "-X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME} -s -w" \
            -o "${OUT}" ./cmd/gateway

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packages/gateway/dist/${{ needs.prepare.outputs.release_tag }}/chatcode-gateway-${{ matrix.goos }}-${{ matrix.goarch }}

  bundle:
    name: Assemble Release Bundle
    runs-on: ubuntu-latest
    needs: [prepare, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: gateway-bin-*
          merge-multiple: true
          path: packages/gateway/dist/${{ needs.prepare.outputs.release_tag }}

      - name: Assemble scripts + checksums
        working-directory: packages/gateway
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.release_tag }}"
          DIST_DIR="dist/${VERSION}"

          : > "${DIST_DIR}/checksums.txt"
          for file in "${DIST_DIR}"/chatcode-gateway-*; do
            [[ -f "${file}" ]] || continue
            sha="$(sha256sum "${file}" | awk '{print $1}')"
            printf '%s\n' "${sha}" > "${file}.sha256"
            printf '%s  %s\n' "${sha}" "$(basename "${file}")" >> "${DIST_DIR}/checksums.txt"
          done

          cp deploy/gateway-install.sh "${DIST_DIR}/gateway-install.sh"
          cp deploy/gateway-cleanup.sh "${DIST_DIR}/gateway-cleanup.sh"
          cp deploy/cloud-init.sh "${DIST_DIR}/cloud-init.sh"
          cp deploy/chatcode-gateway.service "${DIST_DIR}/chatcode-gateway.service"
          cp scripts/update-agent-clis.sh "${DIST_DIR}/update-agent-clis.sh"
          cp scripts/install-git.sh "${DIST_DIR}/install-git.sh"
          cp scripts/install-claude-code.sh "${DIST_DIR}/install-claude-code.sh"
          cp scripts/install-codex.sh "${DIST_DIR}/install-codex.sh"
          cp scripts/install-gemini.sh "${DIST_DIR}/install-gemini.sh"
          cp scripts/install-opencode.sh "${DIST_DIR}/install-opencode.sh"
          chmod +x \
            "${DIST_DIR}/gateway-install.sh" \
            "${DIST_DIR}/gateway-cleanup.sh" \
            "${DIST_DIR}/cloud-init.sh" \
            "${DIST_DIR}/update-agent-clis.sh" \
            "${DIST_DIR}/install-git.sh" \
            "${DIST_DIR}/install-claude-code.sh" \
            "${DIST_DIR}/install-codex.sh" \
            "${DIST_DIR}/install-gemini.sh" \
            "${DIST_DIR}/install-opencode.sh"
          printf '%s\n' "${VERSION}" > "${DIST_DIR}/latest.txt"

          cat > "${DIST_DIR}/manifest.json" <<JSON
          {
            "version": "${VERSION}",
            "targets": ["linux/amd64", "linux/arm64", "darwin/arm64"]
          }
          JSON

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: gateway-release-bundle
          path: packages/gateway/dist/${{ needs.prepare.outputs.release_tag }}

  github-release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: [prepare, bundle]

    steps:
      - name: Remove existing release for tag (clean asset set)
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.data.id });
              core.info(`Deleted existing release ${rel.data.id} for tag ${tag}`);
            } catch (err) {
              if (err.status === 404) {
                core.info(`No existing release for tag ${tag}`);
              } else {
                throw err;
              }
            }

      - name: Remove legacy release assets (if release exists)
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const legacyNames = new Set(["install.sh", "manual-install.sh"]);
            try {
              const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              for (const asset of rel.data.assets || []) {
                if (legacyNames.has(asset.name)) {
                  await github.rest.repos.deleteReleaseAsset({
                    owner,
                    repo,
                    asset_id: asset.id,
                  });
                  core.info(`Deleted legacy asset: ${asset.name}`);
                }
              }
            } catch (err) {
              if (err.status === 404) {
                core.info(`No release found yet for tag ${tag}`);
              } else {
                throw err;
              }
            }

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: gateway-release-bundle
          path: dist/${{ needs.prepare.outputs.release_tag }}

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: dist/${{ needs.prepare.outputs.release_tag }}/*

  publish-r2:
    name: Publish Release Bundle to R2
    runs-on: ubuntu-latest
    needs: [prepare, bundle]
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_RELEASE_BUCKET: ${{ secrets.R2_RELEASE_BUCKET }}

    steps:
      - name: Check R2 publish config
        id: check
        run: |
          if [[ -n "${R2_ACCOUNT_ID}" && -n "${R2_ACCESS_KEY_ID}" && -n "${R2_SECRET_ACCESS_KEY}" && -n "${R2_RELEASE_BUCKET}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping R2 publish: required secrets are missing."
          fi

      - name: Checkout
        if: ${{ steps.check.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Download release bundle
        if: ${{ steps.check.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: gateway-release-bundle
          path: packages/gateway/dist/${{ needs.prepare.outputs.release_tag }}

      - name: Ensure AWS CLI
        if: ${{ steps.check.outputs.enabled == 'true' }}
        run: |
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Verify R2 access
        if: ${{ steps.check.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          export AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
          export AWS_DEFAULT_REGION="auto"
          export AWS_EC2_METADATA_DISABLED="true"

          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          if ! aws --endpoint-url "${R2_ENDPOINT}" s3api head-bucket --bucket "${R2_RELEASE_BUCKET}" >/tmp/r2-head.out 2>/tmp/r2-head.err; then
            echo "::error::R2 preflight failed for bucket '${R2_RELEASE_BUCKET}'."
            echo "::error::Check R2_ACCOUNT_ID / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY secrets."
            cat /tmp/r2-head.err
            exit 1
          fi
          aws --version

      - name: Publish to R2
        if: ${{ steps.check.outputs.enabled == 'true' }}
        working-directory: packages/gateway
        env:
          R2_ACCOUNT_ID: ${{ env.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          RELEASE_PREFIX: gateway
        run: ./scripts/publish-release-r2.sh "${{ needs.prepare.outputs.release_tag }}" "${R2_RELEASE_BUCKET}"
