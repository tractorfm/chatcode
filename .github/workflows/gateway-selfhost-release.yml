name: Gateway Self-Host Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v0.2.0-selfhost.1)"
        required: true
        type: string
      cp_domain:
        description: "Control-plane domain (e.g. cp.example.com)"
        required: true
        type: string
      release_prefix:
        description: "R2 object prefix (default: gateway-selfhost/<cp_domain>)"
        required: false
        type: string
      publish_r2:
        description: "Publish bundle to R2 (requires R2_* secrets)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      cp_domain: ${{ steps.validate.outputs.cp_domain }}
      cp_url: ${{ steps.validate.outputs.cp_url }}
      release_prefix: ${{ steps.validate.outputs.release_prefix }}
    steps:
      - name: Validate release inputs
        id: validate
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.release_tag }}"
          domain="$(echo "${{ github.event.inputs.cp_domain }}" | tr '[:upper:]' '[:lower:]')"
          prefix="${{ github.event.inputs.release_prefix }}"

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::invalid release_tag: ${tag}"
            exit 1
          fi
          if [[ ! "${domain}" =~ ^[a-z0-9.-]+$ ]]; then
            echo "::error::invalid cp_domain: ${domain}"
            exit 1
          fi
          if [[ "${#domain}" -gt 253 ]]; then
            echo "::error::invalid cp_domain: ${domain}"
            exit 1
          fi
          IFS='.' read -r -a labels <<< "${domain}"
          for label in "${labels[@]}"; do
            if [[ -z "${label}" ]]; then
              echo "::error::invalid cp_domain label in '${domain}'"
              exit 1
            fi
            if [[ "${#label}" -gt 63 ]]; then
              echo "::error::cp_domain label too long in '${domain}'"
              exit 1
            fi
            if [[ ! "${label}" =~ ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$ ]]; then
              echo "::error::invalid cp_domain label '${label}'"
              exit 1
            fi
          done

          cp_url="wss://${domain}/gw/connect"
          if [[ -z "${prefix}" ]]; then
            prefix="gateway-selfhost/${domain}"
          fi

          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "cp_domain=${domain}" >> "${GITHUB_OUTPUT}"
          echo "cp_url=${cp_url}" >> "${GITHUB_OUTPUT}"
          echo "release_prefix=${prefix}" >> "${GITHUB_OUTPUT}"

  build-release:
    name: Build & Publish Self-Host Assets
    runs-on: ubuntu-latest
    needs: prepare
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_RELEASE_BUCKET: ${{ secrets.R2_RELEASE_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/gateway/go.mod
          cache-dependency-path: packages/gateway/go.sum

      - name: Build self-host bundle
        working-directory: packages/gateway
        env:
          GATEWAY_SELFHOST_CP_URL: ${{ needs.prepare.outputs.cp_url }}
        run: |
          set -euo pipefail
          ./scripts/build-release.sh "${{ needs.prepare.outputs.release_tag }}"

      - name: Remove existing release for tag
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.data.id });
              core.info(`Deleted existing release ${rel.data.id} for tag ${tag}`);
            } catch (err) {
              if (err.status === 404) {
                core.info(`No existing release for tag ${tag}`);
              } else {
                throw err;
              }
            }

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: "${{ needs.prepare.outputs.release_tag }} (self-host: ${{ needs.prepare.outputs.cp_domain }})"
          prerelease: true
          files: packages/gateway/dist/${{ needs.prepare.outputs.release_tag }}/*
          body: |
            Self-host gateway build.
            - Control-plane URL baked into binary: `${{ needs.prepare.outputs.cp_url }}`
            - Install with matching runtime CP URL:
              `--cp-url ${{ needs.prepare.outputs.cp_url }}`

      - name: Ensure AWS CLI
        if: ${{ github.event.inputs.publish_r2 == 'true' }}
        run: |
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Verify R2 publish config
        if: ${{ github.event.inputs.publish_r2 == 'true' }}
        run: |
          set -euo pipefail
          if [[ -z "${R2_ACCOUNT_ID}" || -z "${R2_ACCESS_KEY_ID}" || -z "${R2_SECRET_ACCESS_KEY}" || -z "${R2_RELEASE_BUCKET}" ]]; then
            echo "::error::publish_r2=true but required R2 secrets are missing."
            exit 1
          fi
          export AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
          export AWS_DEFAULT_REGION="auto"
          export AWS_EC2_METADATA_DISABLED="true"
          aws --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            s3api head-bucket --bucket "${R2_RELEASE_BUCKET}"

      - name: Publish bundle to R2
        if: ${{ github.event.inputs.publish_r2 == 'true' }}
        working-directory: packages/gateway
        env:
          RELEASE_PREFIX: ${{ needs.prepare.outputs.release_prefix }}
        run: |
          set -euo pipefail
          ./scripts/publish-release-r2.sh "${{ needs.prepare.outputs.release_tag }}" "${R2_RELEASE_BUCKET}"
