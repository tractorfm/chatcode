name = "chatcode-cp"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1

[observability.traces]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "chatcode"
database_id = "placeholder"

[[kv_namespaces]]
binding = "KV"
id = "placeholder"

[[durable_objects.bindings]]
name = "GATEWAY_HUB"
class_name = "GatewayHub"

[[migrations]]
tag = "v1"
new_classes = ["GatewayHub"]

[triggers]
crons = ["* * * * *"]

[vars]
DO_CLIENT_ID = ""
GOOGLE_CLIENT_ID = ""
GITHUB_CLIENT_ID = ""
APP_ENV = "dev"
APP_ORIGIN = "https://app.chatcode.dev"
STAGING_APP_ORIGIN = "https://app.staging.chatcode.dev"
STAGING_PAGES_PREVIEW_SUFFIX = "chatcode-app-staging.pages.dev"
# Optional comma-separated explicit allowlist for additional browser origins.
# CORS_ALLOWED_ORIGINS = "https://my-preview.example.com"
# Optional override for auth callback landing URL.
# POST_AUTH_REDIRECT_URL = "https://app.staging.chatcode.dev"
DEFAULT_DROPLET_REGION = "ams3"
DEFAULT_DROPLET_SIZE = "s-2vcpu-2gb"
DEFAULT_DROPLET_IMAGE = "ubuntu-24-04-x64"
GATEWAY_VERSION = "v0.1.4"
GATEWAY_RELEASE_BASE_URL = "https://releases.chatcode.dev/gateway"
# Sustained gateway websocket inbound rate (gateway text/binary + browser text; excludes HTTP fetches).
GATEWAY_HUB_GATEWAY_EVENT_RATE_WARN_PER_SEC = "400"
# Sustained per-session runaway signal (gateway frames + browser acks).
GATEWAY_HUB_SESSION_RUNAWAY_RATE_WARN_PER_SEC = "200"
GATEWAY_HUB_SESSION_ACK_RATE_WARN_PER_SEC = "120"
AUTH_MODE = "dev"
# Optional hardening for AUTH_MODE=dev:
# set with `wrangler secret put DEV_AUTH_SECRET --env <env>`

[env.staging]
name = "chatcode-cp-staging"
workers_dev = true
routes = [{ pattern = "cp.staging.chatcode.dev/*", zone_name = "chatcode.dev" }]

[env.staging.observability]
enabled = true
head_sampling_rate = 1

[env.staging.observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1

[env.staging.observability.traces]
enabled = true
head_sampling_rate = 1

[[env.staging.durable_objects.bindings]]
name = "GATEWAY_HUB"
class_name = "GatewayHub"

[[env.staging.migrations]]
tag = "v1"
new_classes = ["GatewayHub"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "chatcode-staging"
database_id = "ab35aec1-8ef2-47fc-b40f-866e5b1fa82e"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "d81e938334fc41f884e4b24d7bb55437"

[env.staging.vars]
DO_CLIENT_ID = "0bcc8cc64037ea9e451de9a3cac9457a1bf13acd8091100e7f369a18f669d31b"
GOOGLE_CLIENT_ID = "387306225818-5ufnq08al8c08iqh02m50pb5u84598fb.apps.googleusercontent.com"
GITHUB_CLIENT_ID = "Ov23lihg8QD2Od83FTDo"
APP_ENV = "staging"
APP_ORIGIN = "https://app.chatcode.dev"
STAGING_APP_ORIGIN = "https://app.staging.chatcode.dev"
STAGING_PAGES_PREVIEW_SUFFIX = "chatcode-app-staging.pages.dev"
DEFAULT_DROPLET_REGION = "ams3"
DEFAULT_DROPLET_SIZE = "s-2vcpu-2gb"
DEFAULT_DROPLET_IMAGE = "ubuntu-24-04-x64"
GATEWAY_VERSION = "v0.1.4"
GATEWAY_RELEASE_BASE_URL = "https://releases.chatcode.dev/gateway"
# Sustained gateway websocket inbound rate (gateway text/binary + browser text; excludes HTTP fetches).
GATEWAY_HUB_GATEWAY_EVENT_RATE_WARN_PER_SEC = "400"
# Sustained per-session runaway signal (gateway frames + browser acks).
